name: Build Windows EXE

on:
  push:
    branches: [main, master]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install paho-mqtt PyQt5 openpyxl pyinstaller

      - name: EXE bauen
        run: pyinstaller --onefile --windowed --name vbz_mqtt_live --version-file version_info.txt mqtt_viewer.py

      - name: Release erstellen / aktualisieren
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "VBZ MQTT Live – aktuellster Build"
          body: |
            Automatisch gebaute Windows-EXE aus dem letzten Commit auf `main`.

            **Herausgeber:** Daniel Schwander
            **Voraussetzung:** Windows 10/11 (64-bit), keine weitere Installation nötig.

            **Starten:** `vbz_mqtt_live.exe` doppelklicken.
          files: dist/vbz_mqtt_live.exe
          make_latest: true
          prerelease: false
